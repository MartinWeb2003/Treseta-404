<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trešeta Turnir</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #162f1e;
    --green-mid: #1e4a2c;
    --green-felt: #1a5c32;
    --gold: #c9a84c;
    --gold-light: #e8c76a;
    --gold-dim: rgba(201,168,76,0.35);
    --cream: #f5ead8;
    --cream-dark: #d8c49a;
    --red-card: #9b1c1c;
    --red-light: #e57373;
    --shadow: rgba(0,0,0,0.7);
    --panel: rgba(0,0,0,0.4);
    --panel-light: rgba(255,255,255,0.04);
    --border: rgba(201,168,76,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--green);
    background-image:
      radial-gradient(ellipse 80% 50% at 50% 0%, #2a6040 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M40 0L50 30H80L56 48L66 78L40 60L14 78L24 48L0 30H30Z'/%3E%3C/g%3E%3C/svg%3E");
    font-family: 'Libre Baskerville', serif;
    color: var(--cream);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    text-align: center;
    padding: 28px 16px 20px;
    background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .suit-row { font-size: 1.5rem; color: var(--gold); letter-spacing: 0.5em; margin-bottom: 8px; }
  .suit-row .r { color: var(--red-card); }
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.3rem, 5vw, 2rem);
    color: var(--gold-light);
    text-shadow: 0 2px 12px rgba(0,0,0,0.8), 0 0 40px rgba(201,168,76,0.25);
    line-height: 1.3;
  }
  .subtitle { font-size: 0.75rem; color: var(--cream-dark); margin-top: 5px; font-style: italic; opacity: 0.75; letter-spacing: 0.15em; }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); max-width: 320px; margin: 14px auto 0; }

  .section-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.72rem;
    color: var(--gold);
    letter-spacing: 0.25em;
    text-align: center;
    padding: 0 16px 10px;
  }

  /* LEADERBOARD */
  .leaderboard {
    margin: 0 12px 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 24px var(--shadow);
  }
  .lb-head {
    display: grid;
    grid-template-columns: 30px 1fr 36px 36px 36px 50px 54px;
    background: rgba(201,168,76,0.12);
    border-bottom: 1px solid var(--border);
    padding: 8px 10px;
    font-size: 0.6rem;
    color: var(--gold);
    font-family: 'Cinzel Decorative', serif;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .lb-row {
    display: grid;
    grid-template-columns: 30px 1fr 36px 36px 36px 50px 54px;
    padding: 9px 10px;
    border-bottom: 1px solid var(--panel-light);
    align-items: center;
    font-size: 0.83rem;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: rgba(201,168,76,0.07); }
  .lb-rank { text-align: center; font-size: 0.85rem; }
  .lb-name { font-weight: 700; color: var(--cream); padding-left: 6px; font-size: 0.82rem; }
  .lb-cell { text-align: center; color: var(--cream-dark); font-size: 0.78rem; }
  .lb-pts { text-align: center; font-weight: 700; font-size: 1rem; color: var(--gold-light); font-family: 'Cinzel Decorative', serif; }
  .lb-pts-head { text-align: center; }
  .lb-diff { text-align: center; font-size: 0.8rem; font-weight: 700; font-family: 'Cinzel Decorative', serif; }
  .lb-diff.pos { color: #81c784; }
  .lb-diff.neg { color: #e57373; }
  .lb-diff.zero { color: var(--cream-dark); opacity: 0.5; }

  /* ROUNDS */
  .rounds-wrap { padding: 0 12px; display: flex; flex-direction: column; gap: 12px; }
  .round-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 3px 16px rgba(0,0,0,0.4);
  }
  .round-card.predkolo-card {
    border-color: rgba(201,168,76,0.12);
    opacity: 0.85;
  }
  .round-header {
    background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.05));
    border-bottom: 1px solid var(--border);
    padding: 11px 14px;
  }
  .round-title { font-family: 'Cinzel Decorative', serif; font-size: 0.78rem; color: var(--gold-light); letter-spacing: 0.15em; }

  /* MATCH */
  .match-block { border-bottom: 1px solid var(--panel-light); padding: 12px 14px; }
  .match-block:last-child { border-bottom: none; }

  .match-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .table-badge { font-size: 0.6rem; color: var(--gold); font-family: 'Cinzel Decorative', serif; letter-spacing: 0.08em; white-space: nowrap; opacity: 0.8; }
  .team-pill {
    flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 6px 8px; text-align: center; font-size: 0.78rem; font-weight: 700; color: var(--cream); line-height: 1.3;
  }
  .team-pill.no-pts { opacity: 0.55; border-style: dashed; }
  .vs-dot { font-family: 'Cinzel Decorative', serif; font-size: 0.55rem; color: var(--gold); opacity: 0.6; }

  .no-pts-notice {
    font-size: 0.6rem;
    color: var(--gold);
    opacity: 0.6;
    font-style: italic;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  .match-summary { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .game-score-badge {
    font-family: 'Cinzel Decorative', serif; font-size: 0.75rem; padding: 3px 10px;
    border-radius: 20px; border: 1px solid var(--border); color: var(--gold-light);
    background: rgba(201,168,76,0.08); letter-spacing: 0.05em;
  }
  .match-pts-badge { font-size: 0.65rem; padding: 3px 10px; border-radius: 20px; font-family: 'Cinzel Decorative', serif; letter-spacing: 0.05em; }
  .pts-win  { background: rgba(76,175,80,0.15);  border: 1px solid #4caf50; color: #81c784; }
  .pts-none { background: rgba(139,26,26,0.15);  border: 1px solid #8b1a1a; color: #e57373; }

  /* GAMES */
  .games-list { display: flex; flex-direction: column; gap: 8px; }
  .game-block { background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; overflow: hidden; }

  .game-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .game-label { font-family: 'Cinzel Decorative', serif; font-size: 0.6rem; color: var(--gold); letter-spacing: 0.1em; }
  .game-winner-tag { font-size: 0.6rem; padding: 1px 7px; border-radius: 10px; font-family: 'Cinzel Decorative', serif; }
  .gwinner { background: rgba(76,175,80,0.2); border: 1px solid #4caf50; color: #81c784; }
  .ongoing-tag { font-size: 0.6rem; color: var(--gold); opacity: 0.55; font-family: 'Cinzel Decorative', serif; }

  /* HANDS */
  .hands-table { width: 100%; padding: 8px; display: flex; flex-direction: column; gap: 5px; }

  .hand-row { display: grid; grid-template-columns: 18px 1fr 28px 1fr 26px; align-items: center; gap: 5px; }
  .hand-num { font-size: 0.6rem; color: var(--gold); opacity: 0.6; text-align: center; font-family: 'Cinzel Decorative', serif; }
  .hand-input {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px; color: var(--cream); font-family: 'Libre Baskerville', serif;
    font-size: 0.9rem; font-weight: 700; text-align: center; padding: 6px 4px; width: 100%;
    -webkit-appearance: none; transition: border-color 0.15s, background 0.15s;
  }
  .hand-input:focus { outline: none; border-color: var(--gold); background: rgba(201,168,76,0.1); }
  .hand-input.invalid { border-color: var(--red-card); background: rgba(139,26,26,0.15); }
  .hand-sep { text-align: center; font-size: 0.7rem; color: var(--gold); opacity: 0.5; }
  .remove-hand-btn {
    background: none; border: none; color: rgba(229,115,115,0.35); font-size: 1rem;
    cursor: pointer; padding: 0; line-height: 1; transition: color 0.15s; text-align: center;
  }
  .remove-hand-btn:hover { color: var(--red-light); }

  .add-hand-btn {
    width: 100%; padding: 7px; margin-top: 2px;
    background: transparent; border: 1px dashed rgba(201,168,76,0.3); border-radius: 5px;
    color: var(--gold); font-size: 0.65rem; font-family: 'Cinzel Decorative', serif;
    letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
  }
  .add-hand-btn:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }

  .running-bar {
    padding: 6px 10px 7px; display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2);
  }
  .running-label { font-size: 0.58rem; opacity: 0.65; }
  .running-score { font-weight: 700; font-size: 0.95rem; color: var(--gold-light); font-family: 'Cinzel Decorative', serif; }
  .running-score.leading { color: #81c784; }
  .game-diff-bar {
    padding: 4px 10px 6px;
    text-align: center;
    font-size: 0.68rem;
    font-family: 'Cinzel Decorative', serif;
    letter-spacing: 0.08em;
    border-top: 1px solid rgba(255,255,255,0.04);
    background: rgba(0,0,0,0.15);
  }
  .game-diff-bar .diff-pos { color: #81c784; }
  .game-diff-bar .diff-neg { color: #e57373; }

  .add-game-btn {
    width: 100%; padding: 9px; margin-top: 8px;
    background: transparent; border: 1px dashed rgba(201,168,76,0.25); border-radius: 7px;
    color: var(--cream-dark); font-size: 0.65rem; font-family: 'Cinzel Decorative', serif;
    letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
  }
  .add-game-btn:hover { background: rgba(201,168,76,0.07); border-color: var(--gold); color: var(--gold); }
  .add-game-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  .reset-btn {
    display: block; margin: 28px auto 0; padding: 8px 22px;
    background: transparent; border: 1px solid rgba(139,26,26,0.4); border-radius: 5px;
    color: rgba(229,115,115,0.6); font-size: 0.65rem; font-family: 'Cinzel Decorative', serif;
    letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--red-card); color: #e57373; background: rgba(139,26,26,0.1); }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<header>
  <div class="suit-row"><span>♠</span> <span class="r">♥</span> <span>♣</span> <span class="r">♦</span></div>
  <h1>Trešeta Turnir</h1>
  <div class="subtitle">Unos po rukama · Igra do 41 · Svaka ruka = 11 bodova</div>
  <div class="divider"></div>
  <div id="sync-status" style="margin-top:10px;font-size:0.65rem;font-family:'Cinzel Decorative',serif;letter-spacing:0.1em;color:#aaa;">○ Učitavanje…</div>
</header>

<div class="section-title">♠ Ljestvica Igrača ♠</div>
<div class="leaderboard">
  <div class="lb-head">
    <div>#</div>
    <div style="padding-left:6px">Igrač</div>
    <div style="text-align:center">P</div>
    <div style="text-align:center">U</div>
    <div style="text-align:center">G</div>
    <div class="lb-pts-head">Bod</div>
    <div style="text-align:center">+/−</div>
  </div>
  <div id="leaderboard-body"></div>
</div>

<div class="section-title">♣ Raspored i Rezultati ♣</div>
<div class="rounds-wrap" id="rounds-container"></div>

<button class="reset-btn" onclick="resetAll()">↺ Resetiraj sve rezultate</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8C1sHMG9UMP408Jz8fhI6YsS8NAguhMs",
  authDomain: "treseta-b97d3.firebaseapp.com",
  databaseURL: "https://treseta-b97d3-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "treseta-b97d3",
  storageBucket: "treseta-b97d3.firebasestorage.app",
  messagingSenderId: "818607307013",
  appId: "1:818607307013:web:aad8ef757c0eb8fdab9f6c"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const dbRef = ref(db, 'tournament2');

const PLAYERS = ["Batur","Mare","Martin","Antea","Pere","Naka","Ante","Stella","Cvita","Don"];
const WIN_TARGET = 41;
const HAND_TOTAL = 11;

// Predkolo: Don & Stella play one extra match (doesn't count for them, counts for opponents)
const PREDKOLO = [
  {table:1, t1:["Don","Stella"], t2:["Ante","Cvita"], t1NoPoints:true}
];

const SCHEDULE = [
  {round:1, matches:[
    {table:1, t1:["Batur","Mare"],   t2:["Martin","Antea"]},
    {table:2, t1:["Pere","Naka"],    t2:["Ante","Stella"]}
  ]},
  {round:2, matches:[
    {table:1, t1:["Cvita","Don"],    t2:["Batur","Antea"]},
    {table:2, t1:["Mare","Naka"],    t2:["Martin","Stella"]}
  ]},
  {round:3, matches:[
    {table:1, t1:["Pere","Don"],     t2:["Ante","Cvita"]},
    {table:2, t1:["Batur","Naka"],   t2:["Antea","Stella"]}
  ]},
  {round:4, matches:[
    {table:1, t1:["Mare","Don"],     t2:["Martin","Cvita"]},
    {table:2, t1:["Pere","Ante"],    t2:["Batur","Stella"]}
  ]},
  {round:5, matches:[
    {table:1, t1:["Naka","Don"],     t2:["Antea","Cvita"]},
    {table:2, t1:["Mare","Ante"],    t2:["Martin","Pere"]}
  ]},
  {round:6, matches:[
    {table:1, t1:["Batur","Don"],    t2:["Stella","Cvita"]},
    {table:2, t1:["Naka","Ante"],    t2:["Antea","Pere"]}
  ]},
  {round:7, matches:[
    {table:1, t1:["Mare","Martin"],  t2:["Batur","Cvita"]},
    {table:2, t1:["Don","Ante"],     t2:["Stella","Pere"]}
  ]},
  {round:8, matches:[
    {table:1, t1:["Naka","Martin"],  t2:["Antea","Mare"]},
    {table:2, t1:["Batur","Ante"],   t2:["Cvita","Pere"]}
  ]},
  {round:9, matches:[
    {table:1, t1:["Don","Martin"],   t2:["Stella","Mare"]},
    {table:2, t1:["Naka","Antea"],   t2:["Batur","Pere"]}
  ]},
  {round:10, matches:[
    {table:1, t1:["Ante","Martin"],  t2:["Cvita","Mare"]},
    {table:2, t1:["Don","Antea"],    t2:["Stella","Naka"]}
  ]},
  {round:11, matches:[
    {table:1, t1:["Batur","Martin"], t2:["Pere","Mare"]},
    {table:2, t1:["Ante","Antea"],   t2:["Cvita","Naka"]}
  ]},
];

let state = {};
let syncTimer = null;
let isSyncing = false;
let isRemoteUpdate = false;

function setStatus(type, msg) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const colors = { ok: '#81c784', saving: '#e8c76a', error: '#e57373', offline: '#aaa' };
  const icons  = { ok: '●', saving: '↻', error: '✕', offline: '○' };
  el.style.color = colors[type] || '#aaa';
  el.textContent = icons[type] + ' ' + msg;
}

function cacheLocal() {
  try { localStorage.setItem('treseta_v5', JSON.stringify(state)); } catch(e) {}
}
function loadLocal() {
  try { const s = localStorage.getItem('treseta_v5'); if (s) state = JSON.parse(s); } catch(e) {}
}

function loadState() {
  loadLocal();
  renderAll();
  setStatus('saving', 'Spajanje…');

  onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      isRemoteUpdate = true;
      state = data;
      cacheLocal();
      renderAll();
      isRemoteUpdate = false;
    }
    setStatus('ok', 'Sinkronizirano');
  }, () => {
    setStatus('error', 'Greška pri spajanju — lokalni podaci');
  });
}

function saveState() {
  cacheLocal();
  if (isRemoteUpdate) return;
  clearTimeout(syncTimer);
  setStatus('saving', 'Čekanje…');
  syncTimer = setTimeout(pushToCloud, 1500);
}

async function pushToCloud() {
  if (isSyncing) { syncTimer = setTimeout(pushToCloud, 1000); return; }
  isSyncing = true;
  setStatus('saving', 'Spremanje…');
  try {
    await set(dbRef, state);
    setStatus('ok', 'Sinkronizirano');
  } catch(e) {
    setStatus('error', 'Greška pri spremanju');
  } finally {
    isSyncing = false;
  }
}

function getMatchState(ri, mi) {
  if (!state[ri]) state[ri] = {};
  if (!state[ri][mi]) state[ri][mi] = { games: [freshGame()] };
  return state[ri][mi];
}
function freshGame() { return { hands: [{ a: null, b: null }] }; }

function calcGameTotals(game) {
  let a = 0, b = 0;
  for (const h of game.hands) {
    if (h.a !== null) a += h.a;
    if (h.b !== null) b += h.b;
  }
  return { a, b };
}

function gameWinner(game) {
  const { a, b } = calcGameTotals(game);
  if (a >= WIN_TARGET && a > b) return 'a';
  if (b >= WIN_TARGET && b > a) return 'b';
  return null;
}

function matchGamesWon(ms) {
  let wa = 0, wb = 0;
  for (const g of ms.games) {
    const w = gameWinner(g);
    if (w === 'a') wa++;
    else if (w === 'b') wb++;
  }
  return { wa, wb };
}

function matchTournamentPoints(ms) {
  const { wa, wb } = matchGamesWon(ms);
  if (wa === 2 && wb === 0) return { a: 2, b: 0 };
  if (wa === 2 && wb === 1) return { a: 1, b: 0 };
  if (wb === 2 && wa === 0) return { a: 0, b: 2 };
  if (wb === 2 && wa === 1) return { a: 0, b: 1 };
  return null;
}

function accumulateMatch(stats, ms, m, countT1, countT2) {
  const tp = matchTournamentPoints(ms);
  if (!tp) return;
  const { wa, wb } = matchGamesWon(ms);
  for (const g of ms.games) {
    const w = gameWinner(g);
    if (!w) continue;
    const { a, b } = calcGameTotals(g);
    const d = a - b;
    if (countT1) m.t1.forEach(p => { stats[p].diff += d; });
    if (countT2) m.t2.forEach(p => { stats[p].diff -= d; });
  }
  if (countT1) m.t1.forEach(p => { stats[p].pts += tp.a; if (tp.a > 0) stats[p].w++; else stats[p].l++; stats[p].g += wa; });
  if (countT2) m.t2.forEach(p => { stats[p].pts += tp.b; if (tp.b > 0) stats[p].w++; else stats[p].l++; stats[p].g += wb; });
}

function calcStats() {
  const stats = {};
  PLAYERS.forEach(p => stats[p] = { pts: 0, w: 0, l: 0, g: 0, diff: 0 });

  PREDKOLO.forEach((m, mi) => {
    const ms = state['pk']?.[mi];
    if (!ms) return;
    // t1NoPoints: t1 (Don & Stella) don't earn points; t2 (opponents) do
    accumulateMatch(stats, ms, m, !m.t1NoPoints, true);
  });

  SCHEDULE.forEach((rd, ri) => {
    rd.matches.forEach((m, mi) => {
      const ms = state[ri]?.[mi];
      if (!ms) return;
      accumulateMatch(stats, ms, m, true, true);
    });
  });

  return stats;
}

function renderLeaderboard() {
  const stats = calcStats();
  const sorted = PLAYERS.slice().sort((a,b) => stats[b].pts - stats[a].pts || stats[b].w - stats[a].w || stats[b].diff - stats[a].diff);
  const medals = ['🥇','🥈','🥉'];
  document.getElementById('leaderboard-body').innerHTML = sorted.map((p, i) => {
    const s = stats[p];
    const dSign = s.diff > 0 ? '+' : '';
    const dClass = s.diff > 0 ? 'pos' : s.diff < 0 ? 'neg' : 'zero';
    return `<div class="lb-row">
      <div class="lb-rank">${i < 3 ? medals[i] : i+1}</div>
      <div class="lb-name">${p}</div>
      <div class="lb-cell">${s.w}</div>
      <div class="lb-cell">${s.l}</div>
      <div class="lb-cell">${s.g}</div>
      <div class="lb-pts">${s.pts}</div>
      <div class="lb-diff ${dClass}">${dSign}${s.diff}</div>
    </div>`;
  }).join('');
}

function renderRounds() {
  let html = '';

  if (PREDKOLO.length > 0) {
    html += `<div class="round-card predkolo-card">
      <div class="round-header"><div class="round-title">◈ PREDKOLO</div></div>
      ${PREDKOLO.map((m, mi) => renderMatch('pk', m, mi)).join('')}
    </div>`;
  }

  html += SCHEDULE.map((rd, ri) =>
    `<div class="round-card">
      <div class="round-header"><div class="round-title">♦ ${rd.round}. KOLO</div></div>
      ${rd.matches.map((m, mi) => renderMatch(ri, m, mi)).join('')}
    </div>`
  ).join('');

  document.getElementById('rounds-container').innerHTML = html;
}

function renderMatch(ri, m, mi) {
  const ms = getMatchState(ri, mi);
  const { wa, wb } = matchGamesWon(ms);
  const tp = matchTournamentPoints(ms);

  const gsBadge = (wa > 0 || wb > 0) ? `<span class="game-score-badge">${wa} : ${wb}</span>` : '';
  let ptsBadge = '';
  if (tp) {
    const winner = tp.a > 0 ? m.t1.join(' & ') : m.t2.join(' & ');
    const pts = Math.max(tp.a, tp.b);
    const isNoPointsWinner = m.t1NoPoints && tp.a > 0;
    ptsBadge = isNoPointsWinner
      ? `<span class="match-pts-badge pts-none">bez bodova — ${winner}</span>`
      : `<span class="match-pts-badge pts-win">+${pts} bod — ${winner}</span>`;
  }
  const summaryRow = (gsBadge || ptsBadge) ? `<div class="match-summary">${gsBadge}${ptsBadge}</div>` : '';

  const matchDone = tp !== null;
  const canAddGame = !matchDone && ms.games.length < 3;

  const gamesHtml = ms.games.map((g, gi) => renderGame(ri, mi, g, gi, m)).join('');
  const addGameBtn = canAddGame
    ? `<button class="add-game-btn" onclick="addGame('${ri}',${mi})">+ Dodaj partiju ${ms.games.length + 1}</button>`
    : '';

  const noPtsNotice = m.t1NoPoints
    ? `<div class="no-pts-notice">† bodovi se ne broje za ${m.t1.join(' & ')}</div>`
    : '';

  return `<div class="match-block">
    <div class="match-top">
      <div class="table-badge">Stol ${m.table}</div>
      <div class="team-pill${m.t1NoPoints ? ' no-pts' : ''}">${m.t1.join('<br>')}</div>
      <div class="vs-dot">VS</div>
      <div class="team-pill">${m.t2.join('<br>')}</div>
    </div>
    ${noPtsNotice}
    ${summaryRow}
    <div class="games-list">
      ${gamesHtml}
      ${addGameBtn}
    </div>
  </div>`;
}

function renderGame(ri, mi, game, gi, m) {
  const { a, b } = calcGameTotals(game);
  const winner = gameWinner(game);
  const winnerName = winner === 'a' ? m.t1.join(' & ') : winner === 'b' ? m.t2.join(' & ') : null;

  const handsHtml = game.hands.map((h, hi) => {
    const both = h.a !== null && h.b !== null;
    const invalid = both && (h.a + h.b) !== HAND_TOTAL;
    return `<div class="hand-row">
      <div class="hand-num">${hi+1}</div>
      <input class="hand-input${invalid?' invalid':''}" type="number" min="0" max="11"
        value="${h.a !== null ? h.a : ''}" placeholder="—"
        oninput="setHand('${ri}',${mi},${gi},${hi},'a',this.value)">
      <div class="hand-sep">:</div>
      <input class="hand-input${invalid?' invalid':''}" type="number" min="0" max="11"
        value="${h.b !== null ? h.b : ''}" placeholder="—"
        oninput="setHand('${ri}',${mi},${gi},${hi},'b',this.value)">
      <button class="remove-hand-btn" onclick="removeHand('${ri}',${mi},${gi},${hi})">×</button>
    </div>`;
  }).join('');

  let diffBar = '';
  if (winner) {
    const diff = Math.abs(a - b);
    const winTeam = winner === 'a' ? m.t1.join(' & ') : m.t2.join(' & ');
    const loseTeam = winner === 'a' ? m.t2.join(' & ') : m.t1.join(' & ');
    diffBar = `<div class="game-diff-bar">
      Razlika: <span class="diff-pos">+${diff} → ${winTeam}</span>
      &nbsp;·&nbsp;
      <span class="diff-neg">−${diff} → ${loseTeam}</span>
    </div>`;
  }

  return `<div class="game-block">
    <div class="game-header">
      <div class="game-label">Partija ${gi+1}</div>
      ${winnerName
        ? `<span class="game-winner-tag gwinner">✓ ${winnerName}</span>`
        : `<span class="ongoing-tag">do 41 ►</span>`}
    </div>
    <div class="hands-table">
      ${handsHtml}
      ${!winner ? `<button class="add-hand-btn" onclick="addHand('${ri}',${mi},${gi})">+ Dodaj ruku</button>` : ''}
    </div>
    <div class="running-bar">
      <div>
        <div class="running-label">${m.t1.join(' & ')}</div>
        <div class="running-score${a >= WIN_TARGET ? ' leading' : ''}">${a}</div>
      </div>
      <div style="font-size:0.6rem;color:var(--gold);opacity:0.4;font-family:'Cinzel Decorative',serif">vs</div>
      <div style="text-align:right">
        <div class="running-label" style="text-align:right">${m.t2.join(' & ')}</div>
        <div class="running-score${b >= WIN_TARGET ? ' leading' : ''}">${b}</div>
      </div>
    </div>
    ${diffBar}
  </div>`;
}

function setHand(ri, mi, gi, hi, side, val) {
  const ms = getMatchState(ri, mi);
  const parsed = val === '' ? null : parseInt(val, 10);
  ms.games[gi].hands[hi][side] = (isNaN(parsed) || parsed < 0) ? null : Math.min(parsed, HAND_TOTAL);
  saveState(); renderAll();
}

function addHand(ri, mi, gi) {
  const ms = getMatchState(ri, mi);
  ms.games[gi].hands.push({ a: null, b: null });
  saveState(); renderAll();
}

function removeHand(ri, mi, gi, hi) {
  const ms = getMatchState(ri, mi);
  if (ms.games[gi].hands.length <= 1) return;
  ms.games[gi].hands.splice(hi, 1);
  saveState(); renderAll();
}

function addGame(ri, mi) {
  const ms = getMatchState(ri, mi);
  if (ms.games.length >= 3) return;
  ms.games.push(freshGame());
  saveState(); renderAll();
}

function resetAll() {
  if (!confirm('Obrisati sve rezultate?')) return;
  state = {}; saveState(); renderAll();
}

function renderAll() { renderLeaderboard(); renderRounds(); }

window.setHand    = setHand;
window.addHand    = addHand;
window.removeHand = removeHand;
window.addGame    = addGame;
window.resetAll   = resetAll;

loadState();
</script>
</body>
</html>
